<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1c1d1f"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </radialGradient>

    <!-- Glowing Blue Line Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="routeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Vehicle Shadow -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle Tech Radar Rings in Background -->
  <circle cx="500" cy="300" r="450" fill="none" stroke="#262626" stroke-width="1" stroke-dasharray="8 8" opacity="0.3"/>
  <circle cx="500" cy="300" r="300" fill="none" stroke="#262626" stroke-width="1" stroke-dasharray="5 15" opacity="0.2"/>
  <circle cx="500" cy="300" r="150" fill="none" stroke="#262626" stroke-width="1.5" opacity="0.1"/>

  <!-- Grid Map Layout (Streets/Blocks) -->
  <g stroke="#1a1a1c" stroke-width="1" opacity="0.8">
    <!-- Horizontal grid -->
    <line x1="0" y1="50" x2="1000" y2="50" />
    <line x1="0" y1="100" x2="1000" y2="100" />
    <line x1="0" y1="150" x2="1000" y2="150" />
    <line x1="0" y1="200" x2="1000" y2="200" />
    <line x1="0" y1="250" x2="1000" y2="250" />
    <line x1="0" y1="300" x2="1000" y2="300" />
    <line x1="0" y1="350" x2="1000" y2="350" />
    <line x1="0" y1="400" x2="1000" y2="400" />
    <line x1="0" y1="450" x2="1000" y2="450" />
    <line x1="0" y1="500" x2="1000" y2="500" />
    <line x1="0" y1="550" x2="1000" y2="550" />

    <!-- Vertical grid -->
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="400" y1="0" x2="400" y2="600" />
    <line x1="500" y1="0" x2="500" y2="600" />
    <line x1="600" y1="0" x2="600" y2="600" />
    <line x1="700" y1="0" x2="700" y2="600" />
    <line x1="800" y1="0" x2="800" y2="600" />
    <line x1="900" y1="0" x2="900" y2="600" />
  </g>

  <!-- Secondary diagonal streets (Tech City Pattern) -->
  <g stroke="#161718" stroke-width="2" opacity="0.6">
    <line x1="0" y1="0" x2="600" y2="600" />
    <line x1="1000" y1="0" x2="400" y2="600" />
    <line x1="0" y1="400" x2="400" y2="0" />
    <line x1="600" y1="0" x2="1000" y2="400" />
  </g>

  <!-- Major Highway Roads (Thick Dark Lines) -->
  <g stroke="#1f2022" stroke-linecap="round" fill="none">
    <path d="M50 150 L 350 150 Q 500 200 650 150 L 950 150" stroke-width="12"/>
    <path d="M150 50 L 150 250 Q 200 400 350 450 L 850 450" stroke-width="10"/>
    <path d="M850 100 L 850 500" stroke-width="8"/>
    <path d="M100 500 L 900 500" stroke-width="10"/>
  </g>

  <!-- GLOWING BLUE ROUTES (Delivery Paths) -->
  <g fill="none" stroke="url(#routeGrad)" stroke-linecap="round" filter="url(#glow)">
    <!-- Route A: Main East-West Highway -->
    <path d="M50 150 L 350 150 Q 500 200 650 150 L 950 150" stroke-width="4" />
    <!-- Route B: Central Hub Route -->
    <path d="M150 120 L 150 250 Q 200 400 350 450 L 850 450" stroke-width="3" stroke-dasharray="10 6" />
    <!-- Route C: North-South Bypass -->
    <path d="M850 100 L 850 500" stroke-width="3" />
  </g>

  <!-- Route Nodes / Coordinates Rings -->
  <g fill="none" stroke-width="1.5">
    <circle cx="150" cy="150" r="10" stroke="#00d8f6" fill="#00d8f6" fill-opacity="0.1"/>
    <circle cx="150" cy="150" r="4" fill="#00d8f6"/>

    <circle cx="500" cy="180" r="12" stroke="#2563eb" fill="#2563eb" fill-opacity="0.1"/>
    <circle cx="500" cy="180" r="5" fill="#2563eb"/>

    <circle cx="850" cy="150" r="10" stroke="#00d8f6" fill="#00d8f6" fill-opacity="0.1"/>
    <circle cx="850" cy="150" r="4" fill="#00d8f6"/>

    <circle cx="350" cy="450" r="12" stroke="#2563eb" fill="#2563eb" fill-opacity="0.1"/>
    <circle cx="350" cy="450" r="5" fill="#2563eb"/>

    <circle cx="850" cy="450" r="14" stroke="#00d8f6" stroke-dasharray="4 2" fill="#18191b" fill-opacity="0.6"/>
    <circle cx="850" cy="450" r="6" fill="#06b6d4"/>
  </g>

  <!-- CARS / TRUCKS (Sleek Black bodies with cyan/blue accents and borders) -->
  <!-- Vehicle 1: Active Truck on Route A (East-West) -->
  <g transform="translate(240, 130)" filter="url(#shadow)">
    <!-- Sleek Cargo Truck Body (Black with blue stroke) -->
    <!-- Cab -->
    <rect x="35" y="6" width="14" height="12" rx="2" fill="#0c0d0e" stroke="#3b82f6" stroke-width="1.5" />
    <!-- Windshield -->
    <rect x="42" y="8" width="5" height="8" rx="1" fill="#06b6d4" opacity="0.9" />
    <!-- Container -->
    <rect x="2" y="3" width="32" height="18" rx="3" fill="#121315" stroke="#3b82f6" stroke-width="1.5" />
    <!-- Details on container -->
    <line x1="8" y1="3" x2="8" y2="21" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <line x1="16" y1="3" x2="16" y2="21" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <line x1="24" y1="3" x2="24" y2="21" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="8" cy="22" r="3.5" fill="#000" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="28" cy="22" r="3.5" fill="#000" stroke="#3b82f6" stroke-width="1"/>
    <!-- Signal pulse -->
    <circle cx="18" cy="12" r="16" fill="none" stroke="#00d8f6" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="8;20;8" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Vehicle 2: Electric Van on Route B (Central) -->
  <g transform="translate(560, 432)" filter="url(#shadow)">
    <!-- Sleek Delivery Van (Black with glowing blue border) -->
    <rect x="2" y="4" width="28" height="14" rx="3" fill="#0c0d0e" stroke="#06b6d4" stroke-width="1.5" />
    <!-- Windows -->
    <path d="M22 6 L27 6 L25 12 L22 12 Z" fill="#3b82f6" opacity="0.8" />
    <rect x="14" y="6" width="6" height="6" fill="#1e293b" />
    <!-- Wheels -->
    <circle cx="8" cy="19" r="3" fill="#000" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="22" cy="19" r="3" fill="#000" stroke="#06b6d4" stroke-width="1"/>
  </g>

  <!-- Vehicle 3: Heavy Truck on Route C (North-South, moving down) -->
  <g transform="translate(836, 260)" filter="url(#shadow)">
    <!-- Vertical Rotation for south-moving vehicle -->
    <g transform="rotate(90, 14, 14)">
      <!-- Container -->
      <rect x="2" y="3" width="34" height="16" rx="2" fill="#121315" stroke="#3b82f6" stroke-width="1.5" />
      <line x1="10" y1="3" x2="10" y2="19" stroke="#3b82f6" opacity="0.5"/>
      <line x1="20" y1="3" x2="20" y2="19" stroke="#3b82f6" opacity="0.5"/>
      <!-- Cab -->
      <rect x="37" y="5" width="12" height="12" rx="2" fill="#0c0d0e" stroke="#3b82f6" stroke-width="1.5" />
      <rect x="42" y="7" width="4" height="8" rx="0.5" fill="#06b6d4" />
      <!-- Wheels -->
      <circle cx="10" cy="20" r="3" fill="#000" stroke="#3b82f6" stroke-width="1" />
      <circle cx="28" cy="20" r="3" fill="#000" stroke="#3b82f6" stroke-width="1" />
    </g>
  </g>

  <!-- Map HUD details & overlay coordinates (Premium Look) -->
  <g fill="#94a3b8" font-family="monospace" font-size="10" opacity="0.75" pointer-events="none">
    <text x="20" y="35" font-weight="bold" fill="#06b6d4">SYS-MONITOR: ONLINE</text>
    <text x="20" y="50">GRID REF: 40.7128° N, 74.0060° W</text>
    <text x="820" y="35" text-anchor="end" font-weight="bold" fill="#3b82f6">FROTA ATIVA: 3 VEÍCULOS</text>
    <text x="820" y="50" text-anchor="end">ZOOM LEVEL: 100%</text>

    <!-- Compass / Scale -->
    <path d="M930 540 L970 540 M950 520 L950 560" stroke="#262626" stroke-width="1.5"/>
    <text x="950" y="515" text-anchor="middle" font-size="8">N</text>
  </g>
</svg>
